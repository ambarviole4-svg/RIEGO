<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DATOS DE RIEGO - FORMULARIO AGRICOLA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #cbd5e1 0%, #b9c4d4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .form-card {
            max-width: 1000px;
            width: 100%;
            background: #eef3fa;
            border-radius: 48px 32px 48px 32px;
            box-shadow: 0 20px 35px rgba(70, 90, 110, 0.2), 0 0 0 1px rgba(148, 172, 196, 0.3);
            overflow: hidden;
        }

        .hero {
            background: linear-gradient(135deg, #dce5f0, #d2dbe8);
            padding: 1.2rem 2rem 0.8rem 2rem;
            text-align: center;
            border-bottom: 1px solid #c2cfdf;
        }

        .hero h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            font-weight: 700;
            text-shadow: 1px 1px 0 #ffffff80;
            margin-bottom: 0.5rem;
            color: #1e3a5f;
        }

        .image-container {
            background: #ffffffcc;
            border-radius: 60px;
            padding: 8px 12px;
            display: inline-block;
            margin-bottom: 1rem;
            border: 1px solid #cbdae9;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            max-height: 120px;
            border-radius: 40px;
            object-fit: cover;
            border: 2px solid #b7c7dd;
        }

        .form-body {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2c4c74;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        select, input, textarea {
            padding: 12px 16px;
            border-radius: 28px;
            border: 1.5px solid #c9d5e6;
            background: #ffffff;
            color: #1e3a4d;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
            width: 100%;
        }

        select:focus, input:focus, textarea:focus {
            border-color: #7f9cbf;
            box-shadow: 0 0 0 3px rgba(100, 140, 180, 0.2);
        }

        button {
            background: #6f8db0;
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background: #5f7ea2;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #4c7a9a;
            width: 100%;
            justify-content: center;
            padding: 14px;
            font-size: 1.1rem;
            margin-top: 1rem;
            box-shadow: 0 4px 0 #315670;
        }

        .btn-secondary {
            background: #8ba5c0;
            margin-top: 8px;
        }

        .productos-dinamicos {
            background: #f4f8fe;
            border-radius: 24px;
            padding: 1rem;
            margin-top: 0.5rem;
            border: 1px solid #cbdae6;
        }

        .producto-fila {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .producto-fila .producto-input {
            flex: 2;
            min-width: 180px;
        }

        .producto-fila .dosis-numero {
            flex: 0.8;
            min-width: 100px;
        }

        .producto-fila .dosis-unidad {
            flex: 0.8;
            min-width: 100px;
        }

        .producto-fila button {
            background: #d95c5c;
            padding: 8px 16px;
            box-shadow: none;
        }

        .producto-fila button:hover {
            background: #c04a4a;
        }

        .campos-climaticos {
            background: #e8f0f7;
            border-radius: 28px;
            padding: 1.2rem;
            margin-top: 0.5rem;
            border: 1px solid #c9daec;
        }

        .campos-climaticos h3 {
            color: #2c5a7a;
            font-size: 1rem;
            margin-bottom: 1rem;
            font-weight: 600;
            border-left: 4px solid #6f8db0;
            padding-left: 12px;
        }

        .row-2cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .mensaje-estado {
            margin-top: 1.5rem;
            padding: 12px;
            text-align: center;
            border-radius: 60px;
            font-weight: 500;
            display: none;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            border-left: 6px solid #2e7d5e;
            display: block;
        }

        .error {
            background: #ffe6e3;
            color: #ab3e2c;
            border-left: 6px solid #dc6b4a;
            display: block;
        }

        .info-note {
            font-size: 0.75rem;
            color: #6e8db0;
            margin-top: 0.5rem;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .error-border {
            border-color: #dc6b4a !important;
            background-color: #fff5f5 !important;
        }

        .info-ayuda {
            font-size: 0.7rem;
            color: #5a7a9a;
            margin-top: 2px;
            padding-left: 16px;
        }

        /* Barra de progreso para envíos múltiples */
        .progreso-envio {
            margin-top: 1rem;
            display: none;
            background: #dce8f4;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 0.85rem;
            color: #2c5a7a;
            text-align: center;
            font-weight: 500;
        }

        @media (max-width: 680px) {
            .form-body { padding: 1.5rem; }
            .producto-fila { flex-direction: column; }
            .producto-fila button { width: 100%; }
            .row-2cols { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="hero">
        <h1>DATOS DE RIEGO</h1>
        <div class="image-container">
            <img src="descarga.jfif.jpeg" alt="RIEGO" onerror="this.src='https://placehold.co/400x150?text=RIEGO';">
        </div>
        <p style="font-size:0.8rem; color:#3a6182;">GESTION DE RIEGO POR ESPECIE Y FINCA</p>
    </div>

    <div class="form-body">
        <form id="formRiego">
            <!-- ESPECIE -->
            <div class="form-group">
                <label>ESPECIE</label>
                <select id="especieSelect" required>
                    <option value="" disabled selected>-- SELECCIONE --</option>
                    <option value="CLAVEL">CLAVEL</option>
                    <option value="ASTROMERIAS">ASTROMERIAS</option>
                    <option value="ROSAS">ROSAS</option>
                    <option value="RANUNCULUS">RANUNCULUS</option>
                    <option value="DELPHINIUM">DELPHINIUM</option>
                </select>
            </div>

            <!-- LOCALIDAD -->
            <div class="form-group">
                <label>LOCALIDAD</label>
                <select id="fincaSelect" required>
                    <option value="">-- SELECCIONE LOCALIDAD --</option>
                </select>
                <input type="hidden" id="localidadHidden" value="">
            </div>

            <!-- FECHA -->
            <div class="form-group">
                <label>FECHA</label>
                <input type="date" id="fechaRiego" required>
            </div>

            <!-- HECTAREAS -->
            <div class="form-group">
                <label>HECTAREAS DE LA FINCA</label>
                <input type="text" id="hectareas" placeholder="EJ: 12,75" required>
                <div class="info-ayuda">Use coma (,) como separador decimal</div>
                <div id="hectareasError" class="info-note" style="color:#dc6b4a; display:none;">ERROR: Ingrese un número válido</div>
            </div>

            <!-- TIPO DE PRODUCTO -->
            <div class="form-group">
                <label>TIPO DE PRODUCTO</label>
                <select id="tipoProductoSelect" required>
                    <option value="" disabled selected>-- ELIGA UNA OPCION --</option>
                    <option value="FORMULA_FERTILIZACION">FORMULA FERTILIZACION</option>
                    <option value="NO_SE_RIEGA">NO SE RIEGA</option>
                    <option value="AGUA_ACIDA">AGUA ACIDA</option>
                    <option value="OTRO_PRODUCTO">OTRO PRODUCTO</option>
                </select>
            </div>

            <!-- PRODUCTOS DINAMICOS -->
            <div id="productosDinamicosContainer" class="hidden">
                <div class="productos-dinamicos">
                    <label>PRODUCTOS APLICADOS</label>
                    <div class="info-note" style="background:#dce8f4; padding:6px 12px; border-radius:16px; margin-bottom:10px; color:#2c5a7a;">
                    </div>
                    <div id="productosList"></div>
                    <button type="button" id="agregarProductoBtn" class="btn-secondary">AGREGAR OTRO PRODUCTO + DOSIS</button>
                </div>
            </div>

            <!-- CAMPOS AMBIENTALES -->
            <div class="campos-climaticos" style="margin-top: 1.5rem;">
                <h3>PARAMETROS AMBIENTALES Y DE RIEGO</h3>
                <div class="info-ayuda">Use coma (,) como separador decimal</div>
                <div class="row-2cols">
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label>C.E.</label>
                        <input type="text" id="ceClimatico" placeholder="Ejemplo: 1,74" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label>P.H.</label>
                        <input type="text" id="ph" placeholder="Ejemplo: 5,36" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label>JOULES (RADIACION)</label>
                        <input type="text" id="joules" placeholder="Ejemplo: 1374" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label>M3 TOTAL (METROS CUBICOS)</label>
                        <input type="text" id="m3Total" placeholder="Ejemplo: 476" required>
                        <div class="info-ayuda">El valor ingresado es en m3</div>
                    </div>
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label>TEMP_MINIMA (°C)</label>
                        <input type="text" id="tempMin" placeholder="Ejemplo: 3,3" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label>TEMP_MAX (°C)</label>
                        <input type="text" id="tempMax" placeholder="Ejemplo: 22,3" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0.8rem;">
                        <label>PLUVIOSIDAD (MM)</label>
                        <input type="text" id="pluviosidad" placeholder="EJ: 0" required>
                    </div>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn-primary">GUARDAR</button>
            <div id="progresoEnvio" class="progreso-envio"></div>
            <div id="mensajeRespuesta" class="mensaje-estado"></div>
        </form>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbykyijQ6XpCBNSI3OEQbTqu6__5ptgesb6-l6LG7C7YwQs9jd8q8UGo-ly_MCS7eMIU/exec";

    const todasLasFincas = [
        "ARCOFLOR", "DALI", "ECUANROS 1", "ECUANROS 2", "TESSA 1-2",
        "TESSA 3", "TESSA 4", "PONTE TRESA", "PICASSO", "ROSAS DEL MONTE", "SOLERA"
    ];

    function obtenerFincasPorEspecie(especie) {
        if (especie === "ROSAS") return [...todasLasFincas];
        if (especie === "ASTROMERIAS" || especie === "CLAVEL") return ["TESSA 4"];
        if (especie === "RANUNCULUS" || especie === "DELPHINIUM") return ["SOLERA"];
        return [];
    }

    const productosMaster = [
        "NITRATO DE CALCIO",
        "MANVERT MOVILI",
        "NITRATO DE CALCIO",
        "NITRATO DE AMONIO",
        "FE-EDDHA",
        "FE-EDTA",
        "FE-DTPA",
        "MN-EDTA",
        "ZN-EDTA",
        "CU-EDTA",
        "NITRATO DE POTASIO",
        "NITRATO DE MAGNESIO",
        "FOSFATO MONOAMONICO",
        "FOSFATO MONOPOTASICO",
        "SULFATO DE AMONIO",
        "SULFATO DE MAGNESIO",
        "SULFATO DE POTASIO",
        "UREA VERDE",
        "URFOS",
        "BORAX",
        "SULFATO DE ZINC",
        "SULFATO DE COBRE",
        "MOLIBDATO DE AMONIO",
        "FYTONIC",
        "X-TEND",
        "ACIDO BORICO",
        "ACIDO FOSFORICO",
        "ACIDO NITRICO",
        "LOWER 7",
        "ACIDO SULFURICO",
        "MAINSTAY CALCIO",
        "MOLIBDATO DE SODIO",
        "SULFATO DE MANGANESO",
        "DERYAGUAS"
    ];

    const unidadesMedida = ["kg", "g", "mg", "L", "mL", "m³", "gal", "ppm", "%"];

    // DOM
    const especieSelect       = document.getElementById('especieSelect');
    const fincaSelect         = document.getElementById('fincaSelect');
    const localidadHidden     = document.getElementById('localidadHidden');
    const fechaRiego          = document.getElementById('fechaRiego');
    const hectareasInput      = document.getElementById('hectareas');
    const hectareasError      = document.getElementById('hectareasError');
    const tipoProductoSelect  = document.getElementById('tipoProductoSelect');
    const productosDinamicosContainer = document.getElementById('productosDinamicosContainer');
    const productosListDiv    = document.getElementById('productosList');
    const agregarProductoBtn  = document.getElementById('agregarProductoBtn');
    const form                = document.getElementById('formRiego');
    const btnSubmit           = document.getElementById('btnSubmit');
    const mensajeDiv          = document.getElementById('mensajeRespuesta');
    const progresoDiv         = document.getElementById('progresoEnvio');
    const ceClimatico         = document.getElementById('ceClimatico');
    const ph                  = document.getElementById('ph');
    const joules              = document.getElementById('joules');
    const m3Total             = document.getElementById('m3Total');
    const tempMin             = document.getElementById('tempMin');
    const tempMax             = document.getElementById('tempMax');
    const pluviosidad         = document.getElementById('pluviosidad');

    let filaCounter = 0;

    // ── VALIDACION NUMERICA ──────────────────────────────────────────
    function validarNumero(valor) {
        if (!valor || valor.trim() === "") return false;
        return /^\d+(,\d+)?$/.test(valor.trim());
    }

    function formatearInputNumerico(inputElement, permitirNegativo) {
        inputElement.addEventListener('input', function(e) {
            let val = e.target.value;
            const esNegativo = permitirNegativo && val.startsWith('-');
            val = val.replace(/[^0-9,]/g, '');
            const partes = val.split(',');
            if (partes.length > 2) val = partes[0] + ',' + partes.slice(1).join('');
            if (esNegativo) val = '-' + val;
            e.target.value = val;
        });
    }

    // ── FINCAS ───────────────────────────────────────────────────────
    function actualizarFincas() {
        const especie = especieSelect.value;
        fincaSelect.innerHTML = '<option value="">-- SELECCIONE LOCALIDAD --</option>';
        localidadHidden.value = "";
        if (!especie) return;
        const fincas = obtenerFincasPorEspecie(especie);
        fincas.forEach(function(f) {
            const opt = document.createElement('option');
            opt.value = f;
            opt.textContent = f;
            fincaSelect.appendChild(opt);
        });
        if (fincas.length === 1) {
            fincaSelect.value = fincas[0];
            localidadHidden.value = fincas[0];
        }
    }

    fincaSelect.addEventListener('change', function() {
        localidadHidden.value = this.value;
    });

    // ── TIPO DE PRODUCTO ─────────────────────────────────────────────
    function handleTipoProductoChange() {
        const tipo = tipoProductoSelect.value;
        productosDinamicosContainer.classList.add('hidden');
        if (tipo === "OTRO_PRODUCTO") {
            productosDinamicosContainer.classList.remove('hidden');
            if (productosListDiv.children.length === 0) agregarFilaProducto();
        }
    }

    // ── PRODUCTOS DINAMICOS ──────────────────────────────────────────
    function agregarFilaProducto(productoSeleccionado, dosisNumero, unidadSeleccionada) {
        productoSeleccionado = productoSeleccionado || "";
        dosisNumero          = dosisNumero          || "";
        unidadSeleccionada   = unidadSeleccionada   || "kg";

        const filaId  = 'fila_' + Date.now() + '_' + filaCounter++;
        const divFila = document.createElement('div');
        divFila.className = 'producto-fila';
        divFila.id = filaId;

        const inputProducto = document.createElement('input');
        inputProducto.type = 'text';
        inputProducto.placeholder = 'PRODUCTO';
        inputProducto.className = 'producto-input';
        inputProducto.value = productoSeleccionado;
        inputProducto.required = true;
        inputProducto.setAttribute('list', 'datalist_' + filaId);

        const datalist = document.createElement('datalist');
        datalist.id = 'datalist_' + filaId;
        productosMaster.forEach(function(prod) {
            const option = document.createElement('option');
            option.value = prod;
            datalist.appendChild(option);
        });

        const inputDosisNumero = document.createElement('input');
        inputDosisNumero.type = 'text';
        inputDosisNumero.placeholder = 'DOSIS';
        inputDosisNumero.className = 'dosis-numero';
        inputDosisNumero.value = dosisNumero;
        inputDosisNumero.required = true;
        inputDosisNumero.style.textAlign = "center";
        formatearInputNumerico(inputDosisNumero);

        const selectUnidad = document.createElement('select');
        selectUnidad.className = 'dosis-unidad';
        unidadesMedida.forEach(function(unidad) {
            const option = document.createElement('option');
            option.value = unidad;
            option.textContent = unidad;
            if (unidad === unidadSeleccionada) option.selected = true;
            selectUnidad.appendChild(option);
        });

        const btnEliminar = document.createElement('button');
        btnEliminar.textContent = 'ELIMINAR';
        btnEliminar.type = 'button';
        btnEliminar.onclick = function() {
            divFila.remove();
            if (productosListDiv.children.length === 0) agregarFilaProducto();
        };

        inputProducto.addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        divFila.appendChild(inputProducto);
        divFila.appendChild(datalist);
        divFila.appendChild(inputDosisNumero);
        divFila.appendChild(selectUnidad);
        divFila.appendChild(btnEliminar);
        productosListDiv.appendChild(divFila);
    }

    // ── OBTENER LISTA DE PRODUCTOS (array, no concatenado) ───────────
    function obtenerListaProductos() {
        const filas = document.querySelectorAll('#productosList .producto-fila');
        const lista = [];
        filas.forEach(function(fila) {
            const inputProd  = fila.querySelector('.producto-input');
            const dosisNum   = fila.querySelector('.dosis-numero');
            const selectUnid = fila.querySelector('.dosis-unidad');
            if (inputProd && inputProd.value.trim() && dosisNum && dosisNum.value.trim()) {
                lista.push({
                    producto: inputProd.value.trim().toUpperCase(),
                    dosis:    dosisNum.value.trim() + ' ' + selectUnid.value
                });
            }
        });
        return lista;
    }

    // ── ENVIO A GOOGLE SHEETS (una fila) ────────────────────────────
    async function enviarFila(fila) {
        try {
            const params = new URLSearchParams();
            for (const [key, value] of Object.entries(fila)) {
                params.append(key, value);
            }
            const url = GOOGLE_SCRIPT_URL + "?" + params.toString();
            const response = await fetch(url, { method: 'GET' });
            if (!response.ok) return { ok: false, msg: "Error HTTP: " + response.status };

            const texto = await response.text();
            let data;
            try {
                data = JSON.parse(texto);
            } catch(e) {
                return { ok: true }; // Respuesta no-JSON pero fetch exitoso
            }
            return data.resultado === "exito"
                ? { ok: true }
                : { ok: false, msg: data.mensaje || "Error desconocido" };
        } catch (e) {
            return { ok: false, msg: e.message };
        }
    }

    // ── MENSAJE ──────────────────────────────────────────────────────
    function mostrarMensaje(texto, tipo) {
        mensajeDiv.textContent = texto;
        mensajeDiv.className = 'mensaje-estado ' + tipo;
        mensajeDiv.style.display = 'block';
        setTimeout(function() { mensajeDiv.style.display = 'none'; }, 4500);
    }

    // ── LIMPIAR ──────────────────────────────────────────────────────
    function limpiarFormulario() {
        especieSelect.value = "";
        fincaSelect.innerHTML = '<option value="">-- SELECCIONE LOCALIDAD --</option>';
        localidadHidden.value = "";
        tipoProductoSelect.value = "";
        hectareasInput.value = "";
        ceClimatico.value = "";
        ph.value = "";
        joules.value = "";
        m3Total.value = "";
        tempMin.value = "";
        tempMax.value = "";
        pluviosidad.value = "";
        productosListDiv.innerHTML = "";
        productosDinamicosContainer.classList.add('hidden');
        hectareasError.style.display = 'none';
        hectareasInput.classList.remove('error-border');
        inicializarFecha();
        filaCounter = 0;
    }

    // ── SUBMIT ───────────────────────────────────────────────────────
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        mensajeDiv.style.display = 'none';
        progresoDiv.style.display = 'none';

        const especie = especieSelect.value;
        if (!especie) return mostrarMensaje("SELECCIONE UNA ESPECIE.", "error");

        const localidad = localidadHidden.value || fincaSelect.value;
        if (!localidad) return mostrarMensaje("SELECCIONE UNA LOCALIDAD.", "error");

        const fecha = fechaRiego.value;
        if (!fecha) return mostrarMensaje("INGRESE FECHA DE RIEGO.", "error");

        const hectareasRaw = hectareasInput.value.trim();
        if (!hectareasRaw) return mostrarMensaje("INGRESE LAS HECTAREAS.", "error");
        if (!validarNumero(hectareasRaw)) {
            hectareasError.style.display = 'block';
            hectareasInput.classList.add('error-border');
            return mostrarMensaje("HECTAREAS INVALIDAS. Use coma (,) ej: 12,75", "error");
        }
        hectareasError.style.display = 'none';
        hectareasInput.classList.remove('error-border');

        const tipoAplicacion = tipoProductoSelect.value;
        if (!tipoAplicacion) return mostrarMensaje("SELECCIONE UN TIPO DE APLICACION.", "error");

        // Validaciones numéricas ambientales
        const campos = [
            { id: 'ceClimatico', nombre: 'C.E.',       val: ceClimatico.value.trim() },
            { id: 'ph',          nombre: 'P.H.',        val: ph.value.trim() },
            { id: 'joules',      nombre: 'JOULES',      val: joules.value.trim() },
            { id: 'm3Total',     nombre: 'M3 TOTAL',    val: m3Total.value.trim() },
            { id: 'tempMin',     nombre: 'TEMP MINIMA', val: tempMin.value.trim() },
            { id: 'tempMax',     nombre: 'TEMP MAXIMA', val: tempMax.value.trim() },
            { id: 'pluviosidad', nombre: 'PLUVIOSIDAD', val: pluviosidad.value.trim() }
        ];
        for (const campo of campos) {
            if (!campo.val) return mostrarMensaje("INGRESE " + campo.nombre + ".", "error");
            const valParaValidar = campo.id === 'tempMin' ? campo.val.replace('-', '') : campo.val;
            if (!validarNumero(valParaValidar)) {
                return mostrarMensaje(campo.nombre + " INVALIDO. Use coma (,).", "error");
            }
        }

        // ── BASE común para todas las filas ──────────────────────────
        const filaBase = {
            timestamp:       new Date().toLocaleString("es-EC"),
            especie:         especie,
            localidad:       localidad,
            fecha_riego:     fecha,
            hectareas:       hectareasRaw,
            tipo_aplicacion: tipoAplicacion,
            ce:              ceClimatico.value.trim(),
            ph:              ph.value.trim(),
            joules:          joules.value.trim(),
            m3_total:        m3Total.value.trim(),
            temp_min:        tempMin.value.trim(),
            temp_max:        tempMax.value.trim(),
            pluviosidad_mm:  pluviosidad.value.trim()
        };

        btnSubmit.disabled = true;
        btnSubmit.textContent = "GUARDANDO...";

        // ── OTRO PRODUCTO: una fila por producto ─────────────────────
        if (tipoAplicacion === "OTRO_PRODUCTO") {
            const listaProductos = obtenerListaProductos();
            if (listaProductos.length === 0) {
                btnSubmit.disabled = false;
                btnSubmit.textContent = "GUARDAR";
                return mostrarMensaje("AGREGUE AL MENOS UN PRODUCTO CON SU DOSIS.", "error");
            }

            progresoDiv.style.display = 'block';
            let errores = 0;

            for (let i = 0; i < listaProductos.length; i++) {
                progresoDiv.textContent = "ENVIANDO " + "...";
                const fila = Object.assign({}, filaBase, {
                    producto: listaProductos[i].producto,
                    dosis:    listaProductos[i].dosis
                });
                const resultado = await enviarFila(fila);
                if (!resultado.ok) {
                    errores++;
                    console.error("Error en producto " + listaProductos[i].producto + ":", resultado.msg);
                }
            }

            progresoDiv.style.display = 'none';

            if (errores === 0) {
                mostrarMensaje(
                    listaProductos.length > 1
                        ? " DATOS GUARDADOS CORRECTAMENTE"
                        : "DATOS ENVIADOS CORRECTAMENTE",
                    "success"
                );
                limpiarFormulario();
            } else {
                mostrarMensaje(
                    errores + " DE " + listaProductos.length + " FILAS CON ERROR. Revise la conexión.",
                    "error"
                );
            }

        // ── OTROS TIPOS: una sola fila ────────────────────────────────
        } else {
            const etiquetas = {
                "FORMULA_FERTILIZACION": "FORMULA FERTILIZACION",
                "NO_SE_RIEGA":           "NO SE RIEGA",
                "AGUA_ACIDA":            "AGUA ACIDA"
            };
            const fila = Object.assign({}, filaBase, {
                producto: etiquetas[tipoAplicacion] || tipoAplicacion,
                dosis:    ""
            });
            const resultado = await enviarFila(fila);
            if (resultado.ok) {
                mostrarMensaje("DATOS ENVIADOS CORRECTAMENTE", "success");
                limpiarFormulario();
            } else {
                mostrarMensaje("ERROR: " + resultado.msg, "error");
            }
        }

        btnSubmit.disabled = false;
        btnSubmit.textContent = "GUARDAR";
    });

    // ── INIT ─────────────────────────────────────────────────────────
    function inicializarFecha() {
        fechaRiego.value = new Date().toISOString().split('T')[0];
    }

    formatearInputNumerico(ceClimatico);
    formatearInputNumerico(ph);
    formatearInputNumerico(joules);
    formatearInputNumerico(m3Total);
    formatearInputNumerico(tempMin, true);
    formatearInputNumerico(tempMax);
    formatearInputNumerico(pluviosidad);
    formatearInputNumerico(hectareasInput);

    especieSelect.addEventListener('change', actualizarFincas);
    tipoProductoSelect.addEventListener('change', handleTipoProductoChange);
    agregarProductoBtn.addEventListener('click', function() { agregarFilaProducto(); });

    hectareasInput.addEventListener('input', function() {
        if (this.value && !validarNumero(this.value)) {
            hectareasError.style.display = 'block';
            this.classList.add('error-border');
        } else {
            hectareasError.style.display = 'none';
            this.classList.remove('error-border');
        }
    });

    window.addEventListener('DOMContentLoaded', function() {
        inicializarFecha();
        actualizarFincas();
        handleTipoProductoChange();
    });
</script>
</body>
</html>
